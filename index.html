<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a0a0a" />
  <link rel="manifest" href="/manifest.json" />
  <title>Spread Trust</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    h1 { font-size: 1.4rem; margin: 1.5rem 0 0.5rem; color: #fff; }
    .subtitle { font-size: 0.85rem; color: #888; margin-bottom: 1.5rem; }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 1rem 1.2rem;
      width: 90%;
      max-width: 400px;
      margin-bottom: 1rem;
    }
    .card-title { font-size: 0.75rem; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.5rem; }

    .address {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.8rem;
      word-break: break-all;
      color: #7dd3fc;
      cursor: pointer;
    }
    .balance { font-size: 1.8rem; font-weight: 700; color: #fff; }
    .balance-symbol { font-size: 0.9rem; color: #888; margin-left: 0.3rem; }

    #scanner-container {
      width: 90%;
      max-width: 400px;
      aspect-ratio: 1;
      border-radius: 12px;
      overflow: hidden;
      position: relative;
      background: #111;
      display: none;
    }
    #scanner-container video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .scanner-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    .scanner-frame {
      width: 65%;
      aspect-ratio: 1;
      border: 2px solid rgba(125, 211, 252, 0.5);
      border-radius: 12px;
    }

    button {
      background: #7dd3fc;
      color: #0a0a0a;
      border: none;
      border-radius: 10px;
      padding: 0.9rem 1.5rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      width: 90%;
      max-width: 400px;
      margin-top: 0.5rem;
      transition: opacity 0.2s;
    }
    button:active { opacity: 0.7; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    button.secondary { background: #2a2a2a; color: #e0e0e0; }

    .send-form { display: none; }
    .send-form input {
      width: 100%;
      background: #111;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 0.7rem;
      color: #fff;
      font-size: 0.9rem;
      margin-bottom: 0.5rem;
      font-family: inherit;
    }
    .send-form input::placeholder { color: #555; }
    .send-form .to-address {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.75rem;
      color: #7dd3fc;
      word-break: break-all;
      margin-bottom: 0.5rem;
    }

    #status {
      margin-top: 1rem;
      font-size: 0.85rem;
      text-align: center;
      padding: 0 1rem;
      min-height: 1.5rem;
    }
    .status-success { color: #4ade80; }
    .status-error { color: #f87171; }
    .status-info { color: #888; }

    .actions { width: 90%; max-width: 400px; display: flex; flex-direction: column; gap: 0.5rem; align-items: center; }

    .tx-link { color: #7dd3fc; text-decoration: none; font-size: 0.8rem; }
    .tx-link:hover { text-decoration: underline; }

    .reset-btn {
      background: none;
      border: none;
      color: #f87171;
      font-size: 0.75rem;
      cursor: pointer;
      margin-top: 2rem;
      margin-bottom: 2rem;
      width: auto;
      padding: 0.5rem;
    }
  </style>
</head>
<body>
  <h1>Spread Trust</h1>
  <p class="subtitle">Burner wallet for Intuition Chain</p>

  <div class="card">
    <div class="card-title">Your Burner Wallet</div>
    <div class="address" id="wallet-address" title="Tap to copy"></div>
  </div>

  <div class="card">
    <div class="card-title">Balance</div>
    <div><span class="balance" id="balance">—</span><span class="balance-symbol">TRUST</span></div>
  </div>

  <div id="scanner-container">
    <video id="scanner-video" autoplay playsinline></video>
    <div class="scanner-overlay"><div class="scanner-frame"></div></div>
  </div>

  <div class="card send-form" id="send-form">
    <div class="card-title">Send to</div>
    <div class="to-address" id="send-to"></div>
    <input type="text" id="send-amount" placeholder="Amount (TRUST)" inputmode="decimal" />
    <button id="send-btn" style="width:100%; margin-top:0">Send</button>
  </div>

  <div class="actions">
    <button id="scan-btn">Scan QR Code</button>
    <button id="stop-scan-btn" class="secondary" style="display:none">Cancel Scan</button>
  </div>

  <div id="status"></div>

  <button class="reset-btn" id="reset-btn">Reset Wallet</button>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
